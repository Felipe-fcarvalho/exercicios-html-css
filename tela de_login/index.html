<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login,vpn_key_off" />
<body>
    <main>
        <section class="container">            
            <div class="imagem">
                
            </div>
            <div class="form">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. <br> Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                    <form id="input" method="post" autocomplete="on">
                        <div class="containerFlex">
                            <span for="email" class="material-symbols-outlined">login</span>
                            <input name="email" id="email" type="email" required placeholder="Insira seu email">
                        </div>
                        <div class="containerFlex">
                            <span class="material-symbols-outlined">vpn_key_off</span>
                            <input type="password" required minlength="8" placeholder="Insira sua senha" autocomplete="current-password"></div>
                        <div class="containerFlex">
                            <button class="btn" type="submit">Entrar</button>
                        </div>
                        <div class="containerFlex">
                            <button class="btn" id="secondary" type="button" >Esqueci a senha</button>
                        </div>
                    </form>
            </div>

        </section>
    </main>
</body>
</html>
